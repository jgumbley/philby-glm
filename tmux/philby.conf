# Philby-owned tmux server configuration.
#
# `make` starts tmux with this file on the `philby-glm` socket, so these
# settings do not depend on or modify the user's default tmux server.

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 10
set -g focus-events on
set -g extended-keys on
set -g set-titles on
set -g set-titles-string '#T'

set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-style bg=colour235,fg=colour250
set -g status-left-length 48
set -g status-right-length 80
set -g status-left '🐘 #[fg=colour81,bold]philby#[default] #[fg=colour245]glm-5.2 · #S:#I.#P '
set -g status-right '#[fg=colour245]#{window_panes} panes · %Y-%m-%d %H:%M '
setw -g window-status-current-style fg=colour81,bold

bind-key r if-shell 'test -f "#{pane_current_path}/tmux/philby.conf"' \
  'source-file "#{pane_current_path}/tmux/philby.conf"; display-message "philby tmux config reloaded"' \
  'display-message "philby tmux config not found in current pane path"'
bind-key | split-window -h -c "#{pane_current_path}"
bind-key - split-window -v -c "#{pane_current_path}"
bind-key C-t new-window -c "#{pane_current_path}"

# Allow kitty icat / graphics passthrough from panes (needed by image-show).
set -g allow-passthrough on
