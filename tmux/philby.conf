# Philby-owned tmux server configuration.
#
# `make` starts tmux with this file on the `philby-glm` socket, so these
# settings do not depend on or modify the user's default tmux server.

set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g detach-on-destroy off
set -g escape-time 10
set -g focus-events on
set -g extended-keys on
set -g set-titles on
set -g set-titles-string '#T'
set -g allow-rename off
setw -g automatic-rename off

set -g status on
set -g status-interval 60
set -g status-position bottom
set -g status-style bg=#1E1E1E,fg=#4FC1FF
set -g status-left-length 4
set -g status-right-length 0
set -g status-left '#[fg=#4FC1FF]📡'
set -g status-right ''
setw -g window-status-format           '#[fg=#888] #I:#W '
setw -g window-status-current-format '#[fg=#4FC1FF,bold] #I:#W '
set -g message-style fg=#1E1E1E,bg=#9CDCFE,bold
set -g pane-border-status off
set -g pane-border-style fg=#333333
set -g pane-active-border-style fg=#484E50
set -g display-panes-colour "#666666"
set -g display-panes-active-colour "#4FC1FF"

bind-key r if-shell 'test -f "#{pane_current_path}/tmux/philby.conf"' \
  'source-file "#{pane_current_path}/tmux/philby.conf"; display-message "philby tmux config reloaded"' \
  'display-message "philby tmux config not found in current pane path"'
# Panes are now windows (one work unit per window, shown on the bottom bar).
# Prefix-style splits still create windows for muscle-memory compat.
bind-key | new-window -c "#{pane_current_path}"
bind-key - new-window -c "#{pane_current_path}"
bind-key C-t new-window -c "#{pane_current_path}"

# Prefix-less window navigation. Requires `extended-keys on` (set above).
# These specific keys were verified to survive the operator's stack:
# local terminal -> local tmux -> ssh -> remote philby tmux:
#   Ctrl-Home  -> CSI 1;5H  (parses as C-Home)
#   Ctrl-End   -> CSI 1;5F  (parses as C-End)
#   Ctrl-Delete-> CSI 3;5~  (parses as C-DC)
# Note: Ctrl-Enter and Ctrl-Backspace do NOT survive (Ctrl-Enter collapses to
# plain Enter; Ctrl-BSpace is grabbed by the outer/local tmux), so they are
# intentionally NOT used here.
#
# Ctrl-End: next window, or create a new one if already at the last window.
#   #{==:#{window_index},#{session_windows}} is true only at the highest
#   window index (base-index 1 + renumber-windows on => count == last index).
bind-key -n C-End if-shell -F '#{==:#{window_index},#{session_windows}}' \
  'new-window -c "#{pane_current_path}"' \
  'next-window'

# Ctrl-Home: previous window (no-op when only one window exists).
bind-key -n C-Home previous-window

# Ctrl-Delete (tmux key name C-DC): close the current window, but never the
# operator window (window index 1, named "philby"). Closing other windows is
# non-destructive to the session because detach-on-destroy is off.
bind-key -n C-DC if-shell -F '#{==:#{window_index},1}' \
  'display-message "refusing to close operator window"' \
  'kill-window'

# Open lazygit in a new window. Plain-letter binding (prefix g) is reliable
# over SSH from Termux, where function keys and many Ctrl-combos are awkward.
bind-key g new-window -n lazygit -c "#{pane_current_path}" 'lazygit -p "#{pane_current_path}"'

# Allow kitty icat / graphics passthrough from panes (needed by image-show).
set -g allow-passthrough on
